<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Facts - Learn your fruit facts here!</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="box">
        <h1>Welcome to Fruit Facts!</h1>
        <div class="container">
            <div class="search-bar">
                <p>You can search for any fruit you would like to learn more about here!</p>
                <form>
                    <input type="text" placeholder="Search..." id="input">
                    <button class="search-button" id="submit">Search</button>   
                </form>
            </div>
        </div>
        <br>
        <div class="texts">
        <p>Or you could learn more about our most popular fruits here!</p>
        </div>
        <div class="popular-fruits">
            <div class="apple">
                <h2>Apple</h2>
                <img src="https://images.unsplash.com/photo-1630563451961-ac2ff27616ab?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YXBwbGV8ZW58MHx8MHx8fDA%3D" alt="Apple" width="300px" height="300px">
                <button class ="apple-button" id="apple-button">Learn more</button>
            </div>
            <div class="banana">
                <h2>Banana</h2>
                <img src="https://images.unsplash.com/photo-1587132137056-bfbf0166836e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmFuYW5hfGVufDB8fDB8fHww" alt="Banana" width="300px" height="300px">
                <button class="banana-button" id="banana-button">Learn more</button>
            </div>
        </div>
        <br>
        <div class="result-display">
            <h1>Here are your facts!</h1>
            <p id="result-text"></p>   
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
